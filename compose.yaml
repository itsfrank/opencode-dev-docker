services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCODE_TAG: ${OPENCODE_TAG:-latest}
    image: opencode-dev:local
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace/repos
    stdin_open: true
    tty: true
    environment:
      HOME: /home/opencode
      XDG_CONFIG_HOME: /home/opencode/.config
      XDG_DATA_HOME: /home/opencode/.local/share
    ports:
      - "4096:4096"
      - "7000-7010:7000-7010"
    volumes:
      - ${WORKSPACE_DIR:-.}:/workspace/repos
      - ${HOME}/.config/opencode:/home/opencode/.config/opencode
      - ${HOME}/.local/share/opencode:/home/opencode/.local/share/opencode
    command: ["serve", "--hostname", "0.0.0.0", "--port", "4096", "--print-logs"]
